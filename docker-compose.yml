version: '3.8'

services:
  flarebox:
    build: .
    image: flarebox:latest
    container_name: flarebox
    ports:
      - "2525:2525"
    volumes:
      - ./data:/app/data
      - ./settings.db:/app/settings.db
    environment:
      - PORT=2525
      - DATABASE_PATH=/app/settings.db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:2525/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
