{{define "content"}}
<div class="container">
    <div class="dashboard">
        <div class="dashboard-header">
            <h1>Email Inbox</h1>
            <p class="text-muted">View and manage your received emails</p>
            <a href="/settings" class="btn btn-secondary" style="margin-left: auto;">
                <span class="material-icons" style="font-size: 18px; vertical-align: middle;">settings</span>
                Settings
            </a>
        </div>

        <!-- Email Generator Section -->
        <div class="email-generator-card">
            <div class="generator-header">
                <h3>Generate Test Email</h3>
            </div>
            <div class="generator-body">
                <button hx-get="/partials/generate-email" hx-target="#generator-result" hx-swap="innerHTML"
                    class="btn btn-primary btn-sm">
                    <span class="material-icons"
                        style="font-size: 18px; vertical-align: middle; margin-right: 4px;">add</span>
                    Generate Email Address
                </button>
                <div id="generator-result"></div>
            </div>
        </div>

        <!-- Email Inbox -->
        <div class="email-inbox-container">
            <div class="inbox-header">
                <h2>Your Email Addresses</h2>
                <button hx-get="/dashboard/addresses" hx-target="#email-addresses-list" hx-swap="innerHTML"
                    class="btn btn-text">
                    <span class="material-icons" style="font-size: 18px;">refresh</span>
                </button>
            </div>
            <div id="email-addresses-list" hx-get="/dashboard/addresses" hx-trigger="load" hx-swap="innerHTML">
                <div class="loading">Loading emails...</div>
            </div>
        </div>
    </div>
</div>

<!-- Password Change Modal -->
{{if .MustChangePassword}}
<div class="modal active" id="password-modal">
    <div class="modal-content">
        <div class="modal-header">
            <h2>Change Password Required</h2>
        </div>
        <form hx-post="/change-password" hx-on::after-request="if(event.detail.successful) location.reload()">
            <div id="password-error" class="error-message"></div>

            <div class="form-group">
                <label for="old_password">Current Password</label>
                <input type="password" id="old_password" name="old_password" required>
            </div>

            <div class="form-group">
                <label for="new_password">New Password</label>
                <input type="password" id="new_password" name="new_password" required minlength="8">
                <small>Minimum 8 characters</small>
            </div>

            <div class="modal-footer">
                <button type="submit" class="btn btn-primary">Update Password</button>
            </div>
        </form>
    </div>
</div>
{{end}}
{{end}}
